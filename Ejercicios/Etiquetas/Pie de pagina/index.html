<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie de pagina con figcaption e improvisado</title>
</head>
<body>

    <figure>
        <img src="./img/image.png" alt="Trulli" style="width:100%">
    </figure>

    <!--Pie de pagina improvisado con css en linea-->
    <p style= "margin-top: -4%; margin-left: 10%;"
    >Pie de pagina con css sin figcaption</p>

    <!--Salto de linea-->
    <br>

    <figure>
        <img src="./img/image.png" alt="Imagen"></img>
        <figcaption>Pie de pagina con figcaption</figcaption>
    </figure>
    
</body>
</html>
