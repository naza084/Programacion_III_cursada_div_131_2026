<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms en HTML e introducción a CSS</title>

    <link rel="stylesheet" href="/Apuntes/00-html-css/Clase 3/css/styles.css">
</head>
<body>
    
    <header>

    </header>

    <main> 
        
        <section>
            <div>
                <!--css inline, pisan todos los demas estilos que ponga ya sea externo o interno -->
                <h1 style="color: aquamarine;">dsadad</h1>
            </div>

        </section>
        
        


        <!--forms-->
        <section>
            <h3>Formularios</h3>
            <h2>HTML Forms</h2>

            <!--
                form es contenedor de las etiquetas input principalmente.
                action es la URL a la que se enviarán los datos del formulario cuando se envíe

                se puede desactivar el autocompletado del formulario con el atributo autocomplete="off",
                por defecto está activado, lo que permite a los navegadores recordar y sugerir entradas anteriores para los campos del formulario.
            -->
            <form action="/action_page.php">
                
                <!--
                    label es la etiqueta que se muestra arriba del input para el
                    usuario para indicar qué información se espera en el campo de entrada.

                    for es un atributo que asocia la etiqueta con un campo de entrada específico, utilizando el id del campo de entrada.
                -->
                <label for="fname">First name:</label><br>

                <!--valor de entrada de tipo texto, su valor se guarda en el atributo name-->
                <input type="text" id="fname" name="fname"><br>
                
                <label for="lname">Last name:</label><br>
                <input type="text" id="lname" name="lname"><br><br>
                
                <br>
                <input type="reset">

                <!--boton para enviar datos de los campos-->
                <input type="submit" value="Submit">


            </form>
            
            
            <!--envio de datos con js será con el valor id-->
            <!--también con html con el atributo name-->

            <!--con js será más simple-->

            <!--con el atributo id tanto en el form como en un label o input
            se puede luego recurrir a ello para estilar con css o manipular con js,
            en el caso del input se podrá acceder a su valor con js mediante el atributo name

            basicamente es el id de toda la vida de toda etiqueta html 
            -->

            <form id="MiForm">

                <label for="fname">First name:</label><br>

                <!--valor de entrada de tipo texto, su valor se guarda en el atributo name-->
                <input type="text" id="fname" name="fname"><br>
                
                <label for="lname">Last name:</label><br>

                <input type="text" id="lname" name="lname"><br><br>
                
                <br>
                <input type="reset">

                <!--boton para enviar datos de los campos-->
                <input type="submit" value="Submit">

                <div>

                    <input type="button" value="Click me" onclick="alert('Button clicked!')">

                    <!--for relaciona el id del input con el label-->
                    <label for="DateID">Ingresa una fecha:</label>
                    <input type="date" id="DateID" name="Date">

                    
                </div>


                <form>
                    <label for="phone">Enter a phone number:</label><br><br>

                    <!--pattern es para regex-->
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="123-45-678" 
                        pattern="^\d{3}-\d{2}-\d{3}$" 
                        required><br><br>
                    <small>Format: 0054-123-45-678</small><br><br>
                    <input type="submit" value="Submit">
                </form>
                
            </form>
        </section>
        
            
            


        <section>


        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
