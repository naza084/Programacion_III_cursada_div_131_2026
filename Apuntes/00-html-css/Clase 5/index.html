<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinadores CSS, Flexbox y media queries</title>

    <style>

        /*solo los p que esten dentro de un div directamente y no contenidos por otra etiqueta se pintaran de azul
        div > p {
            color: blue;
        }
        */

        /*solo los p que sean hermanos adyacentes del div se pintarán de azul
        div ~ p {
            color: blue;
        }
        */
    </style>
    
</head>
<body>
    
    <!--Combinadores en CSS
    
    este es descendiente del div, por lo tanto se pintará de azul
    <div>
        <p> esto es azul
            <section>
                <p>
                    esto será también azul
                </p>
            </section>
        </p>
    </div>    

    <p>no es azul por no ser descendiente del div</p>-->


    <!--combinador hijo directo
    <div>
        <p>esto será azul</p>

        <section>
            <p>esto no será azul por no ser hijo directo del div</p>
        </section>
    </div>

    <p>este tampoco será azul</p>
    -->

    <!--combinador de hermano adyacente
    <div>
        <p>esto es azul</p>
        <p>esto también es azul por ser hermano adyacente del primer p</p>
        <section>
            <p>esto no es azul por no ser hermano adyacente del primer p</p>
        </section>
    </div>-->

    <!--combinador de hermano general
    <div>
        <p>esto no es azul por no ser hermano del div, osea, no continuar despues</p>
        </section>
    </div>
    <p>esto es azul</p>
    -->


    


</body>
</html>
